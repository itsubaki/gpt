name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Tests
        run: |
          make test

      - name: Train BPE Tokenizer
        run: |
          make dl
          make tokenize

      - name: Pre-Train GPT
        run: |
          go run ./cmd/gpt/main.go --context-len 128 --embeddim 192 --batch-size 8 --max-iters 10
          cat loss.csv
