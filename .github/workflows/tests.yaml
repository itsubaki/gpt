name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Tests
        run: |
          make test

      - name: Train BPE Tokenizer
        run: |
          make dl
          make tokenize

      - name: Pre-Train GPT
        run: |
          go run ./cmd/pretrain/main.go --context-len 32 --embed-dim 24 --batch-size 4 --max-iters 5
          cat loss.csv

      - name: Generate Text
        run: |
          go run ./cmd/generate/main.go --max-new-tokens 32
